<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 3rem;
      color: #333;
    }
    button {
      font-size: 1.5rem;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button onclick="document.getElementById('greeting').style.display='block'; document.body.style.backgroundColor='blue'">Click Me</button>
  <h1 id="greeting" style="display:none">Hello, World!</h1>
</body>
</html>
